backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'CMS: create {{collection}} "{{slug}}"'
    update: 'CMS: update {{collection}} "{{slug}}"'
    delete: 'CMS: delete {{collection}} "{{slug}}"'
    uploadMedia: 'CMS: upload {{path}}'
    deleteMedia: 'CMS: delete {{path}}'

local_backend: false

# Default media folder for one-off uploads (rare). Per-campaign media is
# configured below on each field so images and PDFs land next to their
# owning campaign.
media_folder: public/uploads
public_folder: /uploads

site_url: https://burleyweststake.com
display_url: https://burleyweststake.com
logo_url: /favicon.svg

collections:
  # ============================================================
  # CAMPAIGNS — the main content type. One folder per campaign with
  # an index.md and co-located images/ and pdfs/ subfolders.
  # ============================================================
  - name: campaigns
    label: Campaigns
    label_singular: Campaign
    description: 'Stake conferences, Holy Week, Christmas, and other seasonal campaigns.'
    folder: src/content/campaigns
    path: '{{slug}}/index'
    create: true
    delete: true
    slug: '{{slug}}'
    identifier_field: title
    summary: '{{title}} — {{start_date | date("MMMM YYYY")}}'
    fields:
      - { label: 'Title', name: title, widget: string }
      - {
          label: 'URL slug',
          name: slug,
          widget: string,
          hint: 'Used in the page URL. Lowercase letters and hyphens only. Example: april-2026-stake-conference',
        }
      - label: 'Category'
        name: category
        widget: select
        options:
          - { label: 'Stake Conference', value: stake-conference }
          - { label: 'Holy Week', value: holy-week }
          - { label: 'Christmas', value: christmas }
          - { label: 'Temple Celebration', value: temple-celebration }
          - { label: 'Youth Conference', value: youth-conference }
          - { label: 'Other', value: other }
      - {
          label: 'Start date',
          name: start_date,
          widget: datetime,
          date_format: 'YYYY-MM-DD',
          time_format: false,
          format: 'YYYY-MM-DD',
          picker_utc: true,
          hint: 'When this campaign should start showing on the homepage.',
        }
      - {
          label: 'End date',
          name: end_date,
          widget: datetime,
          date_format: 'YYYY-MM-DD',
          time_format: false,
          format: 'YYYY-MM-DD',
          picker_utc: true,
          hint: 'When this campaign should stop being the homepage feature.',
        }
      - { label: 'Hero eyebrow', name: hero_eyebrow, widget: string, required: false, hint: 'Small label above the headline. Example: "Stake Conference Recap"' }
      - { label: 'Hero headline', name: hero_headline, widget: string }
      - { label: 'Hero subhead', name: hero_subhead, widget: text, required: false }
      - {
          label: 'Hero image',
          name: hero_image,
          widget: image,
          required: false,
          media_folder: 'images',
          public_folder: './images',
        }
      - { label: 'Hero image alt text', name: hero_image_alt, widget: string, required: false }

      - label: 'Featured scripture'
        name: featured_scripture
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: 'Quote', name: text, widget: text }
          - { label: 'Reference', name: reference, widget: string, hint: 'Example: 2 Nephi 32:3' }

      - label: 'Photo gallery'
        name: photo_gallery
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: 'Section title', name: title, widget: string, default: 'Photos from the Linger Longer' }
          - { label: 'Section subhead', name: meta, widget: string, required: false, hint: 'Example: "After the Sunday Session"' }
          - label: 'Photos'
            name: photos
            widget: list
            summary: '{{fields.alt}}'
            fields:
              - {
                  label: 'Photo',
                  name: file,
                  widget: image,
                  media_folder: 'images',
                  public_folder: './images',
                }
              - { label: 'Alt text (description)', name: alt, widget: string }
              - {
                  label: 'Featured tile position (1–4)',
                  name: featured_position,
                  widget: number,
                  value_type: int,
                  required: false,
                  min: 1,
                  max: 4,
                  hint: '1 = big tile on the left, 2–4 = small tiles on the right. Leave empty for gallery-only.',
                }

      - {
          label: 'Instagram Embed Code',
          name: instagram_embed_code,
          widget: text,
          required: false,
          hint: 'On Instagram, open the post → tap the three dots → Embed → copy. Paste the entire HTML blob here.',
        }

      - {
          label: 'Featured YouTube Video',
          name: video_embed,
          widget: text,
          required: false,
          hint: 'Paste a YouTube URL (https://youtu.be/abc123 or https://www.youtube.com/watch?v=abc123) OR the full embed code. Either works. Renders as a click-to-load tile below the hero.',
        }
      - {
          label: 'Video caption',
          name: video_caption,
          widget: string,
          required: false,
          hint: 'Optional small caption below the video.',
        }

      - {
          label: 'Draft (hide from site)',
          name: draft,
          widget: boolean,
          default: false,
          required: false,
          hint: 'Check to keep this campaign hidden until ready.',
        }

  # ============================================================
  # TALKS — first-class collection, one folder per campaign slug.
  # ============================================================
  - name: talks
    label: Talks
    label_singular: Talk
    description: 'Individual talks. Each talk gets its own page at /campaigns/<campaign>/talks/<talk>/.'
    folder: src/content/talks
    # Keep talks grouped by campaign on disk: <campaign-slug>/<talk-slug>.md
    # The CMS collection lists talks across all campaigns flat, but the
    # `campaign` frontmatter field controls the on-disk folder.
    path: '{{fields.campaign}}/{{slug}}'
    media_folder: '{{fields.campaign}}'
    public_folder: ''
    create: true
    delete: true
    slug: '{{slug}}'
    identifier_field: title
    summary: '{{title}} — {{speaker}}'
    fields:
      - { label: 'Title', name: title, widget: string }
      - {
          label: 'URL slug',
          name: slug,
          widget: string,
          hint: 'Lowercase letters and hyphens only. Becomes the URL: /campaigns/<campaign>/talks/<slug>/.',
        }
      - { label: 'Speaker', name: speaker, widget: string }
      - {
          label: 'Speaker role',
          name: speaker_role,
          widget: string,
          required: false,
          hint: 'Example: "Stake Presidency", "High Council", "Visiting Authority".',
        }
      - {
          label: 'Campaign',
          name: campaign,
          widget: relation,
          collection: campaigns,
          search_fields: ['title', 'slug'],
          value_field: 'slug',
          display_fields: ['title'],
          hint: 'The stake conference, Holy Week, or other campaign this talk belongs to.',
        }
      - label: 'Session'
        name: session
        widget: select
        options:
          - { label: 'General Session', value: general }
          - { label: 'Adult Session', value: adult }
          - { label: 'Leadership Session', value: leadership }
          - { label: 'Priesthood Leadership Meeting', value: priesthood }
          - { label: 'Youth Session', value: youth }
          - { label: 'Other', value: other }
      - {
          label: 'Session date label',
          name: session_date,
          widget: string,
          hint: 'Free-form. Example: "Sunday, April 19".',
        }
      - {
          label: 'Display order within session',
          name: session_order,
          widget: number,
          value_type: int,
          default: 1,
          hint: 'Lower numbers appear first within a session.',
        }
      - {
          label: 'Featured?',
          name: featured,
          widget: boolean,
          default: false,
          hint: 'Featured talks render as the large prominent card on the homepage. Stake Presidency talks are typically featured.',
        }
      - {
          label: 'Teaser',
          name: teaser,
          widget: text,
          hint: 'One-sentence summary shown on the homepage card.',
        }
      - label: 'Layout'
        name: layout
        widget: select
        options:
          - { label: 'Rich (full talk page with body content)', value: rich }
          - { label: 'PDF only (embedded PDF, no body)', value: pdf }
        default: pdf
        hint: 'Rich = the speaker provided a full outline you transcribe with structured blocks. PDF = upload the file and embed it.'
      - {
          label: 'PDF',
          name: pdf,
          widget: file,
          required: false,
          media_folder: '',
          public_folder: '',
          hint: 'Required for PDF-only mode. Optional for Rich mode (renders as a "Download the Outline" CTA at the bottom).',
        }
      - {
          label: 'Hero image (Rich mode)',
          name: hero_image,
          widget: image,
          required: false,
          media_folder: '',
          public_folder: '',
          hint: 'Large image displayed below the title. Only used in Rich mode.',
        }
      - {
          label: 'Hero image alt text',
          name: hero_image_alt,
          widget: string,
          required: false,
        }

      - label: 'Body (Rich mode only — typed blocks)'
        name: body
        widget: list
        required: false
        typeKey: type
        types:
          - label: 'Heading'
            name: heading
            widget: object
            summary: 'Heading: {{fields.text}}'
            fields:
              - {
                  label: 'Text',
                  name: text,
                  widget: string,
                  hint: 'Section title. Wrap words in *asterisks* for italic emphasis.',
                }
          - label: 'Numbered Area Marker (i., ii., iii., …)'
            name: area
            widget: object
            summary: '{{fields.numeral}} {{fields.text}}'
            fields:
              - { label: 'Numeral', name: numeral, widget: string, hint: 'e.g., "i.", "ii.", "iii.", "iv."' }
              - {
                  label: 'Text',
                  name: text,
                  widget: string,
                  hint: 'Section heading next to the numeral. Wrap words in *asterisks* for italic emphasis.',
                }
          - label: 'Subheading (small uppercase eyebrow)'
            name: subheading
            widget: object
            summary: 'Subheading: {{fields.text}}'
            fields:
              - { label: 'Text', name: text, widget: string }
          - label: 'Scripture quote (gold-accent border)'
            name: scripture
            widget: object
            summary: 'Scripture: {{fields.reference}}'
            fields:
              - { label: 'Reference', name: reference, widget: string, hint: 'e.g., "Ezekiel 33:2-5"' }
              - {
                  label: 'Attribution',
                  name: attribution,
                  widget: string,
                  required: false,
                  hint: 'Optional. e.g., "The Apostle Paul"',
                }
              - {
                  label: 'Text',
                  name: text,
                  widget: text,
                  hint: 'Use blank lines for paragraph breaks.',
                }
          - label: 'Speaker quote (cream-accent border)'
            name: quote
            widget: object
            summary: 'Quote: {{fields.speaker}}'
            fields:
              - { label: 'Speaker', name: speaker, widget: string, hint: 'e.g., "President Russell M. Nelson"' }
              - {
                  label: 'Source',
                  name: source,
                  widget: string,
                  required: false,
                  hint: 'Optional. e.g., "April 2026 General Conference"',
                }
              - {
                  label: 'Text',
                  name: text,
                  widget: text,
                  hint: 'Wrap words in *asterisks* for the bold gold-highlight emphasis. Blank lines = paragraph breaks.',
                }
          - label: 'Inline graphic (image)'
            name: graphic
            widget: object
            summary: 'Graphic: {{fields.alt}}'
            fields:
              - {
                  label: 'Image',
                  name: image,
                  widget: image,
                  media_folder: '',
                  public_folder: '',
                  hint: 'Displays full column width. Use for quote tiles or other inline graphics.',
                }
              - { label: 'Alt text', name: alt, widget: string }
              - {
                  label: 'Caption',
                  name: caption,
                  widget: string,
                  required: false,
                  hint: 'Optional small caption below the image.',
                }
          - label: 'Bullet list'
            name: list
            widget: object
            summary: 'List ({{fields.items.length}} items)'
            fields:
              - {
                  label: 'Intro (optional)',
                  name: intro,
                  widget: string,
                  required: false,
                  hint: 'Optional lead-in text shown above the list.',
                }
              - label: 'Items'
                name: items
                widget: list
                fields:
                  - {
                      label: 'Text',
                      name: text,
                      widget: string,
                      hint: 'Wrap words in *asterisks* for italic emphasis.',
                    }
                  - label: 'Sub-items (optional)'
                    name: nested
                    widget: list
                    required: false
                    field: { label: 'Sub-bullet text', name: '', widget: string }
          - label: 'Three-dot ornament divider'
            name: ornament
            widget: object
            summary: 'Ornament divider'
            fields:
              - {
                  label: 'Note',
                  name: note,
                  widget: hidden,
                  default: '',
                }

      - {
          label: 'OG image override (optional)',
          name: og_image,
          widget: image,
          required: false,
          media_folder: '',
          public_folder: '',
          hint: 'Optional. Image used for share-preview cards. Defaults to the hero image, then to the campaign hero.',
        }

      - {
          label: 'Draft (hide from site)',
          name: draft,
          widget: boolean,
          default: false,
          required: false,
        }

  # ============================================================
  # SITE SETTINGS — single file, edited as a form.
  # ============================================================
  - name: site
    label: Site Settings
    description: 'Brand text, leadership, wards, contact info, resource links.'
    files:
      - file: src/content/site.yaml
        name: site
        label: Site Settings
        fields:
          - label: 'Brand'
            name: brand
            widget: object
            fields:
              - { label: 'Pre-name eyebrow', name: pre, widget: string }
              - { label: 'Full name', name: name, widget: string }
              - { label: 'Short name', name: short_name, widget: string }
          - { label: 'Site description', name: description, widget: text }
          - label: 'Social'
            name: social
            widget: object
            fields:
              - { label: 'Facebook URL', name: facebook, widget: string }
              - { label: 'Instagram URL', name: instagram, widget: string }
          - label: 'Office'
            name: office
            widget: object
            fields:
              - { label: 'Address line 1', name: address_line_1, widget: string }
              - { label: 'Address line 2', name: address_line_2, widget: string }
              - { label: 'Email', name: email, widget: string }
          - label: 'Stake Presidency'
            name: presidency
            widget: list
            summary: '{{fields.name}} — {{fields.role}}'
            fields:
              - { label: 'Name', name: name, widget: string }
              - { label: 'Role', name: role, widget: string }
          - label: 'Wards'
            name: wards
            widget: list
            summary: '{{fields.name}}'
            fields:
              - { label: 'Ward name', name: name, widget: string }
              - { label: 'Member Tools URL', name: url, widget: string }
          - label: 'Resources (homepage tiles)'
            name: resources
            widget: list
            summary: '{{fields.name}}'
            fields:
              - { label: 'Name', name: name, widget: string }
              - { label: 'One-line description', name: description, widget: string }
              - { label: 'URL', name: url, widget: string }
              - label: 'Icon'
                name: icon
                widget: select
                options:
                  - { label: 'Calendar', value: calendar }
                  - { label: 'Book', value: book }
                  - { label: 'Video', value: video }
                  - { label: 'Layers', value: layers }
                  - { label: 'Briefcase', value: briefcase }
                  - { label: 'Map pin', value: 'map-pin' }

  # ============================================================
  # CATEGORIES — single keyed YAML; edit names and descriptions.
  # ============================================================
  - name: categories
    label: Categories
    description: 'Display names, descriptions, and ordering for collection categories.'
    files:
      - file: src/content/categories.yaml
        name: categories
        label: Categories
        fields:
          - label: 'Stake Conference'
            name: stake-conference
            widget: object
            fields:
              - { label: 'Display name', name: name, widget: string }
              - { label: 'Description', name: description, widget: text }
              - { label: 'Display order', name: display_order, widget: number, value_type: int }
          - label: 'Holy Week'
            name: holy-week
            widget: object
            fields:
              - { label: 'Display name', name: name, widget: string }
              - { label: 'Description', name: description, widget: text }
              - { label: 'Display order', name: display_order, widget: number, value_type: int }
          - label: 'Christmas'
            name: christmas
            widget: object
            fields:
              - { label: 'Display name', name: name, widget: string }
              - { label: 'Description', name: description, widget: text }
              - { label: 'Display order', name: display_order, widget: number, value_type: int }
          - label: 'Temple Celebration'
            name: temple-celebration
            widget: object
            fields:
              - { label: 'Display name', name: name, widget: string }
              - { label: 'Description', name: description, widget: text }
              - { label: 'Display order', name: display_order, widget: number, value_type: int }
          - label: 'Youth Conference'
            name: youth-conference
            widget: object
            fields:
              - { label: 'Display name', name: name, widget: string }
              - { label: 'Description', name: description, widget: text }
              - { label: 'Display order', name: display_order, widget: number, value_type: int }
          - label: 'Other'
            name: other
            widget: object
            fields:
              - { label: 'Display name', name: name, widget: string }
              - { label: 'Description', name: description, widget: text }
              - { label: 'Display order', name: display_order, widget: number, value_type: int }
