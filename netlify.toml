[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--no-audit --no-fund"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

# ============================================================
# Redirects
# ============================================================

# www -> apex (canonical = burleyweststake.com)
[[redirects]]
  from = "https://www.burleyweststake.com/*"
  to = "https://burleyweststake.com/:splat"
  status = 301
  force = true

# Old Squarespace URLs -> new equivalents
[[redirects]]
  from = "/templecelebration"
  to = "/collections/temple-celebration/"
  status = 301
[[redirects]]
  from = "/templecelebration/*"
  to = "/collections/temple-celebration/"
  status = 301

[[redirects]]
